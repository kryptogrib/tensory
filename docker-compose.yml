services:
  tensory:
    build: .
    ports:
      - "8888:8888"
    environment:
      - TENSORY_DB_PATH=/data/tensory.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
    volumes:
      - tensory-data:/data

volumes:
  tensory-data:
