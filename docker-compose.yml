# Tensory Dashboard — one command to see your agent's memory
#
# Usage:
#   docker compose up -d
#   open http://localhost:7770
#
# The dashboard reads the same SQLite database that tensory-mcp writes to.
# Mount your MCP database via TENSORY_DB_PATH or the default volume.
#
# With your MCP database:
#   TENSORY_DB_PATH=~/.local/share/tensory/memory.db docker compose up -d

services:
  dashboard:
    build: .
    ports:
      - "${TENSORY_DASHBOARD_PORT:-7770}:7770"
    environment:
      - TENSORY_DB_PATH=/data/memory.db
    volumes:
      # Mount host database directory so dashboard sees plugin data
      - ~/.local/share/tensory:/data
    restart: unless-stopped
